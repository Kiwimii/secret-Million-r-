name: Verify host round package read

on:
  workflow_run:
    workflows: ["Deploy Supabase Database"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: verify-host-round-package-read
  cancel-in-progress: true

jobs:
  verify:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      TESTED_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Resolve browser key
        id: config
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            --header "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_ID/api-keys?reveal=true" \
            --output api-keys.json
          key=$(node <<'NODE'
          const keys = require('./api-keys.json');
          const item = keys.find((entry) => entry.type === 'publishable') ?? keys.find((entry) => entry.name === 'anon');
          if (!item?.api_key) process.exit(1);
          process.stdout.write(item.api_key);
          NODE
          )
          echo "::add-mask::$key"
          echo "NEXT_PUBLIC_SUPABASE_URL=https://${SUPABASE_PROJECT_ID}.supabase.co" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$key" >> "$GITHUB_ENV"

      - name: Verify host-only table read
        id: verify
        continue-on-error: true
        shell: bash
        run: |
          node <<'NODE' 2>&1 | tee host-round-package-read.log
          const { createClient } = require('@supabase/supabase-js');
          const makeClient = () => createClient(
            process.env.NEXT_PUBLIC_SUPABASE_URL,
            process.env.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY,
            { auth: { persistSession: false, autoRefreshToken: false } },
          );
          async function signIn(client) {
            const response = await client.auth.signInAnonymously();
            if (response.error) throw response.error;
          }
          async function rpc(client, name, args) {
            const response = await client.rpc(name, args);
            if (response.error) throw new Error(`${name}: ${response.error.message}`);
            return response.data;
          }
          async function main() {
            const host = makeClient();
            const player = makeClient();
            await signIn(host);
            await signIn(player);
            let gameId;
            try {
              const created = await rpc(host, 'create_live_game', { game_title: `Permission ${Date.now()}`, host_pin: '2486' });
              const game = created[0];
              gameId = game.game_id;
              await rpc(host, 'select_live_round_package', {
                target_game_id: gameId,
                target_round: 1,
                mission_catalog_id: 'permission-test-mission',
                mission_title: 'Berechtigungstest',
                mission_task: 'Technischer Test',
                mission_success_criteria: 'Datensatz gespeichert',
                mission_time_window: 'Runde 1',
                advantage_catalog_id: 'millionaire-double-vote',
                advantage_effect: 'double_vote',
                advantage_title: 'Doppelte Stimme',
                advantage_description: 'Testvorteil',
                advantage_player_instructions: 'Stimme normal ab.',
                advantage_host_instructions: 'Automatische Auswertung.',
                advantage_limit: 'Nur Runde 1',
                advantage_selection_mode: 'none',
              });

              const hostRead = await host.from('round_advantage_selections')
                .select('round_number,catalog_id')
                .eq('game_id', gameId);
              if (hostRead.error) throw new Error(`Host-Lesezugriff fehlgeschlagen: ${hostRead.error.message}`);
              if (hostRead.data?.length !== 1) throw new Error('André erhält den gespeicherten Vorteil nicht.');

              const playerRead = await player.from('round_advantage_selections')
                .select('round_number,catalog_id')
                .eq('game_id', gameId);
              if (playerRead.error) throw new Error(`Spielerabfrage sollte durch RLS leer bleiben, nicht technisch scheitern: ${playerRead.error.message}`);
              if ((playerRead.data ?? []).length !== 0) throw new Error('Ein Spieler konnte die geheime Vorteilsfestlegung lesen.');

              await rpc(host, 'delete_own_live_game', { target_game_id: gameId });
              gameId = undefined;
              console.log('André darf lesen; Spieler erhält durch RLS keine geheimen Daten.');
            } finally {
              if (gameId) {
                try { await rpc(host, 'delete_own_live_game', { target_game_id: gameId }); } catch {}
              }
            }
          }
          main().catch((error) => { console.error(error); process.exit(1); });
          NODE

      - name: Record status
        if: always()
        env:
          CONFIG_OUTCOME: ${{ steps.config.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          status="erfolgreich"
          if [[ "$CONFIG_OUTCOME" != "success" || "$VERIFY_OUTCOME" != "success" ]]; then status="fehlgeschlagen"; fi
          {
            echo "# André-Rundenpaket-Leserechte"
            echo
            echo "- Status: $status"
            echo "- Zeitpunkt (UTC): $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "- Commit: $TESTED_SHA"
            echo "- Browser-Konfiguration: $CONFIG_OUTCOME"
            echo "- André liest Vorteil / Spieler bleibt ausgeschlossen: $VERIFY_OUTCOME"
            echo
            echo '```text'
            tail -n 80 host-round-package-read.log 2>/dev/null || true
            echo '```'
          } > docs/HOST_ROUND_PACKAGE_READ_STATUS.md
          git add docs/HOST_ROUND_PACKAGE_READ_STATUS.md
          git commit -m "[skip ci] Record host round package read status" || exit 0
          git push origin main

      - name: Fail unsuccessful verification
        if: always() && (steps.config.outcome != 'success' || steps.verify.outcome != 'success')
        run: exit 1
