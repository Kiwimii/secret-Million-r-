name: Deploy Supabase Database

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/deploy-supabase.yml"

permissions:
  contents: write

concurrency:
  group: supabase-production-database
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN" || { echo "SUPABASE_ACCESS_TOKEN fehlt"; exit 1; }
          test -n "$SUPABASE_DB_PASSWORD" || { echo "SUPABASE_DB_PASSWORD fehlt"; exit 1; }
          test -n "$SUPABASE_PROJECT_ID" || { echo "SUPABASE_PROJECT_ID fehlt"; exit 1; }

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Initialize CLI configuration
        run: supabase init --force

      - name: Normalize live migration source
        shell: bash
        run: |
          set -euo pipefail
          migration="supabase/migrations/20260724000000_live_game_instances.sql"
          python <<'PY'
          from pathlib import Path
          path = Path("supabase/migrations/20260724000000_live_game_instances.sql")
          text = path.read_text()
          old = "  current_role public.game_role\n"
          new = '  "current_role" public.game_role\n'
          if old in text:
              path.write_text(text.replace(old, new, 1))
          elif new not in text:
              raise SystemExit("Die erwartete current_role-Deklaration wurde nicht gefunden.")
          PY
          grep -n '"current_role" public.game_role' "$migration"

      - name: Link remote project
        id: link
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          supabase link --project-ref "$SUPABASE_PROJECT_ID" 2>&1 | tee supabase-link.log

      - name: Preview migrations
        id: preview
        continue-on-error: true
        if: steps.link.outcome == 'success'
        shell: bash
        run: |
          set -o pipefail
          supabase db push --dry-run --debug 2>&1 | tee supabase-preview.log

      - name: Apply migrations
        id: apply
        continue-on-error: true
        if: steps.link.outcome == 'success' && steps.preview.outcome == 'success'
        shell: bash
        run: |
          set -o pipefail
          supabase db push --debug 2>&1 | tee supabase-apply.log

      - name: Record database deployment status
        if: always()
        env:
          LINK_OUTCOME: ${{ steps.link.outcome }}
          PREVIEW_OUTCOME: ${{ steps.preview.outcome }}
          APPLY_OUTCOME: ${{ steps.apply.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          status="erfolgreich"
          if [[ "$LINK_OUTCOME" != "success" || "$PREVIEW_OUTCOME" != "success" || "$APPLY_OUTCOME" != "success" ]]; then
            status="fehlgeschlagen"
          fi

          {
            echo "# Supabase-Datenbank-Deployment"
            echo
            echo "- Status: $status"
            echo "- Zeitpunkt (UTC): $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "- Commit: $GITHUB_SHA"
            echo "- Projektverknüpfung: $LINK_OUTCOME"
            echo "- Migrationsvorschau: $PREVIEW_OUTCOME"
            echo "- Migration angewendet: $APPLY_OUTCOME"
            echo
            echo "## Letzte Diagnosezeilen"
            echo '```text'
            for file in supabase-link.log supabase-preview.log supabase-apply.log; do
              if [[ -f "$file" ]]; then
                echo "--- $file ---"
                tail -n 120 "$file" \
                  | sed -E 's/(postgresql:\/\/[^:]+:)[^@]+@/\1***@/g' \
                  | sed -E 's/(password[=: ]+)[^ ]+/\1***/Ig'
              fi
            done
            echo '```'
          } > docs/SUPABASE_DEPLOY_STATUS.md

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add docs/SUPABASE_DEPLOY_STATUS.md supabase/migrations/20260724000000_live_game_instances.sql
          git commit -m "[skip ci] Record Supabase deployment status and SQL normalization"
          git push origin main

      - name: Fail unsuccessful deployment
        if: always() && (steps.link.outcome != 'success' || steps.preview.outcome != 'success' || steps.apply.outcome != 'success')
        run: exit 1
