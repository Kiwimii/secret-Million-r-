name: Deploy Supabase Database

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/deploy-supabase.yml"

permissions:
  contents: write

concurrency:
  group: supabase-production-database
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Validate required secrets
        id: secrets
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN" || { echo "SUPABASE_ACCESS_TOKEN fehlt"; exit 1; }
          test -n "$SUPABASE_DB_PASSWORD" || { echo "SUPABASE_DB_PASSWORD fehlt"; exit 1; }
          test -n "$SUPABASE_PROJECT_ID" || { echo "SUPABASE_PROJECT_ID fehlt"; exit 1; }

      - name: Install Supabase CLI
        if: steps.secrets.outcome == 'success'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Initialize CLI configuration
        if: steps.secrets.outcome == 'success'
        run: supabase init --force

      - name: Link remote project
        id: link
        continue-on-error: true
        if: steps.secrets.outcome == 'success'
        shell: bash
        run: |
          set -o pipefail
          supabase link --project-ref "$SUPABASE_PROJECT_ID" 2>&1 | tee supabase-link.log

      - name: Preview migrations
        id: preview
        continue-on-error: true
        if: steps.link.outcome == 'success'
        shell: bash
        run: |
          set -o pipefail
          supabase db push --dry-run --debug 2>&1 | tee supabase-preview.log

      - name: Apply migrations
        id: apply
        continue-on-error: true
        if: steps.link.outcome == 'success' && steps.preview.outcome == 'success'
        shell: bash
        run: |
          set -o pipefail
          supabase db push --debug 2>&1 | tee supabase-apply.log

      - name: Record database deployment status
        if: always()
        env:
          SECRETS_OUTCOME: ${{ steps.secrets.outcome }}
          LINK_OUTCOME: ${{ steps.link.outcome }}
          PREVIEW_OUTCOME: ${{ steps.preview.outcome }}
          APPLY_OUTCOME: ${{ steps.apply.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

          status="erfolgreich"
          if [[ "$SECRETS_OUTCOME" != "success" || "$LINK_OUTCOME" != "success" || "$PREVIEW_OUTCOME" != "success" || "$APPLY_OUTCOME" != "success" ]]; then
            status="fehlgeschlagen"
          fi

          {
            echo "# Supabase-Datenbank-Deployment"
            echo
            echo "- Status: $status"
            echo "- Zeitpunkt (UTC): $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "- Commit: $GITHUB_SHA"
            echo "- Secrets geprüft: $SECRETS_OUTCOME"
            echo "- Projektverknüpfung: $LINK_OUTCOME"
            echo "- Migrationsvorschau: $PREVIEW_OUTCOME"
            echo "- Migration angewendet: $APPLY_OUTCOME"
            echo
            echo "## Letzte Diagnosezeilen"
            echo '```text'
            for file in supabase-link.log supabase-preview.log supabase-apply.log; do
              if [[ -f "$file" ]]; then
                echo "--- $file ---"
                tail -n 120 "$file" \
                  | sed -E 's/(postgresql:\/\/[^:]+:)[^@]+@/\1***@/g' \
                  | sed -E 's/(password[=: ]+)[^ ]+/\1***/Ig'
              fi
            done
            echo '```'
          } > docs/SUPABASE_DEPLOY_STATUS.md

          git add docs/SUPABASE_DEPLOY_STATUS.md
          if git diff --cached --quiet; then
            echo "Datenbankstatus ist unverändert."
          else
            git commit -m "[skip ci] Record Supabase deployment status"
            git push origin main
          fi

      - name: Fail unsuccessful database deployment
        if: always() && (steps.secrets.outcome != 'success' || steps.link.outcome != 'success' || steps.preview.outcome != 'success' || steps.apply.outcome != 'success')
        run: exit 1

