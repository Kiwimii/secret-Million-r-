name: Deploy Supabase Database

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/deploy-supabase.yml"

permissions:
  contents: write

concurrency:
  group: supabase-production-database
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Patch reliable multi-device synchronization
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path

          hook = Path('lib/live/useLiveGame.ts')
          text = hook.read_text()
          marker = '''  useEffect(() => {
    if (!identity || identity.accessRole !== "player") return;
    const timer = window.setInterval(() => {
      const client = clientRef.current;
      if (!client) return;
      const patch = progressRef.current;
      void rpcRows(client, "update_own_player_progress", {
        target_game_id: identity.gameId,
        requested_screen_key: patch.screenKey,
        requested_step_key: patch.stepKey,
        requested_phase_seen: patch.phaseSeen,
        requested_role_revealed: patch.roleRevealed ?? null,
        requested_mission_opened: patch.missionOpened ?? null,
        requested_advantage_opened: patch.advantageOpened ?? null,
        requested_challenge_opened: patch.challengeBriefingOpened ?? null,
        requested_vote_submitted: patch.voteSubmitted ?? null,
        requested_role_decision_submitted: patch.roleDecisionSubmitted ?? null,
      }).catch(() => undefined);
    }, HEARTBEAT_MS);
    return () => window.clearInterval(timer);
  }, [identity]);
'''
          addition = marker + '''
  // Realtime bleibt der schnelle Weg. Das Polling ist der verlässliche Rückfall,
  // falls ein Mobilbrowser die WebSocket-Verbindung pausiert oder verwirft.
  useEffect(() => {
    if (!identity) return;
    let disposed = false;

    const syncNow = () => {
      if (disposed) return;
      void refreshForIdentity(identity).catch(() => undefined);
    };
    const timer = window.setInterval(syncNow, 2500);
    const onVisibilityChange = () => {
      if (document.visibilityState === "visible") syncNow();
    };

    window.addEventListener("focus", syncNow);
    document.addEventListener("visibilitychange", onVisibilityChange);
    return () => {
      disposed = true;
      window.clearInterval(timer);
      window.removeEventListener("focus", syncNow);
      document.removeEventListener("visibilitychange", onVisibilityChange);
    };
  }, [identity, refreshForIdentity]);
'''
          if 'Das Polling ist der verlässliche Rückfall' not in text:
              if marker not in text:
                  raise SystemExit('Heartbeat-Marker nicht gefunden')
              hook.write_text(text.replace(marker, addition, 1))

          migration = Path('supabase/migrations/20260724002000_reliable_live_sync.sql')
          if not migration.exists():
              migration.write_text('''-- Verlässliche Mehrgeräte-Synchronisation auch bei pausierten Mobil-WebSockets.\n\ndrop trigger if exists live_refresh_player_progress on public.player_progress;\ncreate trigger live_refresh_player_progress\nafter insert or update or delete on public.player_progress\nfor each row execute function public.emit_live_game_refresh();\n\ncomment on trigger live_refresh_player_progress on public.player_progress is\n  'Informiert andere Geräte über geänderte Spieleransichten; der Client nutzt zusätzlich ein Polling-Fallback.';\n''')
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/live/useLiveGame.ts supabase/migrations/20260724002000_reliable_live_sync.sql
          if git diff --cached --quiet; then
            echo "Synchronisationspatch bereits vorhanden."
          else
            git commit -m "[skip ci] Make live synchronization resilient"
            git push origin main
          fi

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN" || { echo "SUPABASE_ACCESS_TOKEN fehlt"; exit 1; }
          test -n "$SUPABASE_DB_PASSWORD" || { echo "SUPABASE_DB_PASSWORD fehlt"; exit 1; }
          test -n "$SUPABASE_PROJECT_ID" || { echo "SUPABASE_PROJECT_ID fehlt"; exit 1; }

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Initialize CLI configuration
        run: supabase init --force

      - name: Normalize live migration source
        shell: bash
        run: |
          set -euo pipefail
          migration="supabase/migrations/20260724000000_live_game_instances.sql"
          python <<'PY'
          from pathlib import Path
          path = Path("supabase/migrations/20260724000000_live_game_instances.sql")
          text = path.read_text()
          old = "  current_role public.game_role\n"
          new = '  "current_role" public.game_role\n'
          if old in text:
              path.write_text(text.replace(old, new, 1))
          elif new not in text:
              raise SystemExit("Die erwartete current_role-Deklaration wurde nicht gefunden.")
          PY
          grep -n '"current_role" public.game_role' "$migration"

      - name: Persist normalized migration source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- supabase/migrations/20260724000000_live_game_instances.sql; then
            git add supabase/migrations/20260724000000_live_game_instances.sql
            git commit -m "[skip ci] Quote reserved live progress column"
            git push origin main
          fi

      - name: Link remote project
        id: link
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          supabase link --project-ref "$SUPABASE_PROJECT_ID" 2>&1 | tee supabase-link.log

      - name: Preview migrations
        id: preview
        continue-on-error: true
        if: steps.link.outcome == 'success'
        shell: bash
        run: |
          set -o pipefail
          supabase db push --dry-run --debug 2>&1 | tee supabase-preview.log

      - name: Apply migrations
        id: apply
        continue-on-error: true
        if: steps.link.outcome == 'success' && steps.preview.outcome == 'success'
        shell: bash
        run: |
          set -o pipefail
          supabase db push --debug 2>&1 | tee supabase-apply.log

      - name: Record database deployment status
        if: always()
        env:
          LINK_OUTCOME: ${{ steps.link.outcome }}
          PREVIEW_OUTCOME: ${{ steps.preview.outcome }}
          APPLY_OUTCOME: ${{ steps.apply.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

          status="erfolgreich"
          if [[ "$LINK_OUTCOME" != "success" || "$PREVIEW_OUTCOME" != "success" || "$APPLY_OUTCOME" != "success" ]]; then
            status="fehlgeschlagen"
          fi

          {
            echo "# Supabase-Datenbank-Deployment"
            echo
            echo "- Status: $status"
            echo "- Zeitpunkt (UTC): $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "- Commit: $GITHUB_SHA"
            echo "- Projektverknüpfung: $LINK_OUTCOME"
            echo "- Migrationsvorschau: $PREVIEW_OUTCOME"
            echo "- Migration angewendet: $APPLY_OUTCOME"
            echo
            echo "## Letzte Diagnosezeilen"
            echo '```text'
            for file in supabase-link.log supabase-preview.log supabase-apply.log; do
              if [[ -f "$file" ]]; then
                echo "--- $file ---"
                tail -n 120 "$file" \
                  | sed -E 's/(postgresql:\/\/[^:]+:)[^@]+@/\1***@/g' \
                  | sed -E 's/(password[=: ]+)[^ ]+/\1***/Ig'
              fi
            done
            echo '```'
          } > docs/SUPABASE_DEPLOY_STATUS.md

          git add docs/SUPABASE_DEPLOY_STATUS.md
          if git diff --cached --quiet; then
            echo "Deploymentstatus ist unverändert."
          else
            git commit -m "[skip ci] Record Supabase deployment status"
            git push origin main
          fi

      - name: Fail unsuccessful deployment
        if: always() && (steps.link.outcome != 'success' || steps.preview.outcome != 'success' || steps.apply.outcome != 'success')
        run: exit 1