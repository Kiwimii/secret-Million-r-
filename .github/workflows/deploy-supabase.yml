name: Deploy Supabase Database

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-production-database
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN" || { echo "SUPABASE_ACCESS_TOKEN fehlt"; exit 1; }
          test -n "$SUPABASE_DB_PASSWORD" || { echo "SUPABASE_DB_PASSWORD fehlt"; exit 1; }
          test -n "$SUPABASE_PROJECT_ID" || { echo "SUPABASE_PROJECT_ID fehlt"; exit 1; }

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Initialize CLI configuration
        run: supabase init --force

      - name: Link remote project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Preview migrations
        run: supabase db push --dry-run

      - name: Apply migrations
        run: supabase db push
