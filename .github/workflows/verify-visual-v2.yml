name: Verify visual experience V5

on:
  workflow_run:
    workflows: ["Deploy browser test"]
    types: [completed]
  push:
    branches: [main]
    paths:
      - ".github/workflows/verify-visual-v2.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: verify-visual-v5
  cancel-in-progress: true

jobs:
  verify-visual-v5:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      LIVE_URL: https://kiwimii.github.io/secret-Million-r-/demo/
      RELEASE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Verify deployed start-page resume marker
        id: visual
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 36); do
            if curl --fail --silent --show-error --location "$LIVE_URL" --output live-page.html; then
              if grep -qi 'data-visual-version="midnight-fortune-v3"' live-page.html \
                 && grep -qi 'data-live-flow="authoritative"' live-page.html \
                 && grep -qi 'data-core-game-flow="restored-v1"' live-page.html \
                 && grep -qi 'data-player-resume-version="profile-dropdown-v2"' live-page.html; then
                echo "V5 ist öffentlich: Design, verbindlicher Ablauf, Spielkern und sichtbare Startseiten-Wiedereintrittsversion."
                exit 0
              fi
            fi
            echo "V5-Deployment noch nicht vollständig sichtbar ($attempt/36)."
            sleep 10
          done
          exit 1

      - name: Record visual release status
        if: always()
        env:
          VISUAL_OUTCOME: ${{ steps.visual.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          status="erfolgreich"
          if [[ "$VISUAL_OUTCOME" != "success" ]]; then status="fehlgeschlagen"; fi
          {
            echo "# Visual-Experience-V5-Prüfung"
            echo
            echo "- Status: $status"
            echo "- Zeitpunkt (UTC): $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "- Commit: $RELEASE_SHA"
            echo "- Öffentliche Seite: $LIVE_URL"
            echo "- V3-Design und verbindlicher Live-Ablauf: $VISUAL_OUTCOME"
            echo "- Wiederhergestellter Kernablauf im HTML: $VISUAL_OUTCOME"
            echo "- Sichtbare Startseiten-Wiedereintrittsversion: $VISUAL_OUTCOME"
          } > docs/VISUAL_RELEASE_STATUS.md
          git add docs/VISUAL_RELEASE_STATUS.md
          git commit -m "[skip ci] Record visual V5 release status" || exit 0
          git push origin main

      - name: Fail missing V5 release
        if: always() && steps.visual.outcome != 'success'
        run: exit 1
