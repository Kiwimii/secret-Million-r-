name: Verify live release
# Verifies public Pages, anonymous Supabase Auth and a complete live-game smoke test.

on:
  workflow_run:
    workflows: ["Deploy browser test"]
    types: [completed]
  push:
    branches: [main]
    paths:
      - ".github/workflows/verify-live-release.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: verify-live-release
  cancel-in-progress: true

jobs:
  verify-live:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      LIVE_URL: https://kiwimii.github.io/secret-Million-r-/demo/
      RELEASE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install browser client dependencies
        run: npm install

      - name: Resolve browser configuration
        id: config
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_PROJECT_ID"

          curl --fail --silent --show-error \
            --request PATCH \
            --header "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            --header "Content-Type: application/json" \
            --data '{"external_anonymous_users_enabled":true}' \
            "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_ID/config/auth" \
            --output auth-config.json

          curl --fail --silent --show-error \
            --header "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_ID/api-keys?reveal=true" \
            --output api-keys.json

          publishable_key=$(node <<'NODE'
          const fs = require('node:fs');
          const keys = JSON.parse(fs.readFileSync('api-keys.json', 'utf8'));
          const key = keys.find((item) => item.type === 'publishable')
            ?? keys.find((item) => item.name === 'anon');
          if (!key?.api_key) process.exit(1);
          process.stdout.write(key.api_key);
          NODE
          )
          echo "::add-mask::$publishable_key"
          echo "NEXT_PUBLIC_SUPABASE_URL=https://${SUPABASE_PROJECT_ID}.supabase.co" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$publishable_key" >> "$GITHUB_ENV"

      - name: Verify complete live game flow
        id: backend
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          test -n "${NEXT_PUBLIC_SUPABASE_URL:-}"
          test -n "${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-}"
          node <<'NODE'
          const { createClient } = require('@supabase/supabase-js');
          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

          function client() {
            return createClient(
              process.env.NEXT_PUBLIC_SUPABASE_URL,
              process.env.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY,
              { auth: { persistSession: false, autoRefreshToken: false } },
            );
          }

          async function authenticate(activeClient) {
            const auth = await activeClient.auth.signInAnonymously();
            if (auth.error || !auth.data.user) {
              throw auth.error ?? new Error('Anonyme Authentifizierung lieferte keinen Benutzer.');
            }
          }

          async function deleteGame(host, gameId) {
            const cleanup = await host.rpc('delete_own_live_game', {
              target_game_id: gameId,
            });
            if (cleanup.error) throw cleanup.error;
          }

          async function verifyAttempt(attempt) {
            const host = client();
            const player = client();
            let gameId;

            try {
              await authenticate(host);

              const created = await host.rpc('create_live_game', {
                game_title: `Release-Smoke-Test ${Date.now()}`,
                host_pin: '2486',
              });
              if (created.error) throw created.error;
              const game = Array.isArray(created.data) ? created.data[0] : undefined;
              if (!game?.game_id || !/^\d{6}$/.test(String(game.join_code ?? ''))) {
                throw new Error('create_live_game lieferte keine gültige Partie.');
              }
              gameId = game.game_id;
              const joinCode = String(game.join_code);

              const resumedHost = await host.rpc('resume_live_host', {
                raw_join_code: joinCode,
                host_pin: '2486',
              });
              if (resumedHost.error || resumedHost.data !== gameId) {
                throw resumedHost.error ?? new Error('Die Spielleiter-PIN konnte nicht geprüft werden.');
              }

              await authenticate(player);
              const playerName = `Testspieler-${String(Date.now()).slice(-6)}`;
              const joined = await player.rpc('join_or_resume_live_game', {
                raw_join_code: joinCode,
                requested_display_name: playerName,
                player_pin: '1357',
                requested_avatar_path: null,
              });
              if (joined.error || !Array.isArray(joined.data) || !joined.data[0]?.member_id) {
                throw joined.error ?? new Error('Ein Spielerprofil konnte nicht angelegt werden.');
              }

              const resumedPlayer = await player.rpc('join_or_resume_live_game', {
                raw_join_code: joinCode,
                requested_display_name: playerName,
                player_pin: '1357',
                requested_avatar_path: null,
              });
              if (resumedPlayer.error || !Array.isArray(resumedPlayer.data) || resumedPlayer.data[0]?.resumed !== true) {
                throw resumedPlayer.error ?? new Error('Die Spieler-PIN konnte nicht erneut geprüft werden.');
              }

              const lookup = await player.rpc('lookup_live_game', { raw_join_code: joinCode });
              if (lookup.error || !Array.isArray(lookup.data) || lookup.data[0]?.game_id !== gameId) {
                throw lookup.error ?? new Error('Die erzeugte Partie konnte nicht wiedergefunden werden.');
              }

              await deleteGame(host, gameId);
              gameId = undefined;
              console.log('Live-Partie, Host-PIN, Spieler-PIN und sicheres Aufräumen funktionieren.');
              return;
            } catch (error) {
              if (gameId) {
                try { await deleteGame(host, gameId); } catch {}
              }
              throw new Error(`Versuch ${attempt}: ${error?.message ?? String(error)}`);
            }
          }

          async function verify() {
            let lastError;
            for (let attempt = 1; attempt <= 36; attempt += 1) {
              try {
                await verifyAttempt(attempt);
                return;
              } catch (error) {
                lastError = error;
                console.log(`Backend noch nicht bereit (${attempt}/36): ${error.message}`);
                await sleep(10_000);
              }
            }
            throw lastError ?? new Error('Der vollständige Live-Spieltest blieb erfolglos.');
          }

          verify().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Verify public game page
        id: page
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 36); do
            if curl --fail --silent --show-error --location "$LIVE_URL" --output live-page.html; then
              grep -qi "secret" live-page.html
              echo "Öffentliche Spielseite ist erreichbar."
              exit 0
            fi
            echo "Pages-Deployment noch nicht bereit ($attempt/36)."
            sleep 10
          done
          exit 1

      - name: Record release verification
        if: always()
        env:
          CONFIG_OUTCOME: ${{ steps.config.outcome }}
          BACKEND_OUTCOME: ${{ steps.backend.outcome }}
          PAGE_OUTCOME: ${{ steps.page.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

          verified_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          overall="erfolgreich"
          if [[ "$CONFIG_OUTCOME" != "success" || "$BACKEND_OUTCOME" != "success" || "$PAGE_OUTCOME" != "success" ]]; then
            overall="fehlgeschlagen"
          fi
          {
            echo "# Live-Release-Prüfung"
            echo
            echo "- Status: $overall"
            echo "- Zeitpunkt (UTC): $verified_at"
            echo "- Commit: $RELEASE_SHA"
            echo "- Öffentliche Seite: $LIVE_URL"
            echo "- Browser-Konfiguration: $CONFIG_OUTCOME"
            echo "- Vollständiger Live-Partie-Smoke-Test: $BACKEND_OUTCOME"
            echo "- GitHub Pages HTTP-Prüfung: $PAGE_OUTCOME"
          } > docs/LIVE_RELEASE_STATUS.md

          git add docs/LIVE_RELEASE_STATUS.md
          if git diff --cached --quiet; then
            echo "Live-Release-Status ist unverändert."
          else
            git commit -m "[skip ci] Record live Secret Millionär release status"
            git push origin main
          fi

      - name: Fail unsuccessful release verification
        if: always() && (steps.config.outcome != 'success' || steps.backend.outcome != 'success' || steps.page.outcome != 'success')
        run: exit 1
