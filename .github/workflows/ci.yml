name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck-output.txt

      - name: Upload typecheck diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck-output.txt
          if-no-files-found: ignore
          retention-days: 3

      - name: Lint
        shell: bash
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee lint-output.txt

      - name: Upload lint diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-diagnostics
          path: lint-output.txt
          if-no-files-found: ignore
          retention-days: 3

      - name: Unit tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee test-output.txt

      - name: Upload unit-test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-diagnostics
          path: test-output.txt
          if-no-files-found: ignore
          retention-days: 3

      - name: Production build
        run: npm run build

      - name: Static browser export
        shell: bash
        run: |
          set -o pipefail
          rm -rf .next out
          mv proxy.ts proxy.ts.disabled
          GITHUB_PAGES=true npm run build 2>&1 | tee static-export-output.txt
          test -f out/index.html
          test -f out/demo/index.html

      - name: Upload static export diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: static-export-diagnostics
          path: static-export-output.txt
          if-no-files-found: ignore
          retention-days: 3
